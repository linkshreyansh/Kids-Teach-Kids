<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Teacher - Kids-Teach-Kids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .navbar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b6b;
            text-decoration: none;
        }
        .nav-links a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-align: center;
        }
        p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #ff6b6b;
            outline: none;
        }
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        button:hover {
            background: #ff5252;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="logo">🎓 Kids-Teach-Kids</a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="classes.html">Classes</a>
            <a href="become-teacher.html">Become a Teacher</a>
            <a href="parent-info.html">Parents</a>
            <a href="contact.html">Contact</a>
            <a href="join.html" style="background: #ff6b6b; color: white; padding: 5px 15px; border-radius: 20px;">Join</a>
        </div>
    </div>

    <div class="container">
        <h1>Become a Teacher</h1>
        <p>Share what you love with other kids! 🎓</p>

        <form onsubmit="event.preventDefault(); alert('Thanks for applying! A parent will need to complete verification. We\'ll contact you soon!'); this.reset();">
            <div class="form-group">
                <label>Your Full Name *</label>
                <input type="text" required placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label>Your Age *</label>
                <input type="number" required min="10" max="17" placeholder="10-17">
            </div>

            <div class="form-group">
                <label>Parent/Guardian Email *</label>
                <input type="email" required placeholder="parent@email.com">
            </div>

            <div class="form-group">
                <label>What do you want to teach? *</label>
                <select required>
                    <option value="">Select a subject</option>
                    <option>Math</option>
                    <option>Art</option>
                    <option>Coding</option>
                    <option>Music</option>
                    <option>Science</option>
                    <option>Writing</option>
                </select>
            </div>

            <div class="form-group">
                <label>Why would you be a good teacher? *</label>
                <textarea rows="4" required placeholder="Tell us about your experience and why you love this subject..."></textarea>
            </div>

            <button type="submit">Submit Application 🚀</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.9em;">* Parent permission required. We'll contact your parent to verify.</p>
    </div>

    <div class="footer">
        <p>© 2026 Kids-Teach-Kids. All rights reserved.</p>
    </div>
</body>
</html>
